name: Hito 1 - Pipeline de Calidad CI/CD (Multi-Módulo)

on:
  push:
    branches: [ "main", "feature/*" ]
    paths:
      - 'src/**'
      - 'tests/**'
      - 'composer.json'
      - 'composer.lock'
      - '.github/workflows/**'
  pull_request:
    branches: [ "main" ]
    paths:
      - 'src/**'
      - 'tests/**'

env:
  TEST_FILTER: "Cliente"                            # 🎯 Módulo actual en PHPUnit
  INFECTION_FILTER: "src/Cliente/Dominio,src/Cliente/Aplicacion" # 🎯 Módulo actual en Infection

jobs:
  quality-pipeline:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout del código
      uses: actions/checkout@v4

    - name: Configurar PHP 8.5 con Xdebug
      uses: shivammathur/setup-php@v2
      with:
        php-version: '8.5' # 🟢 GitHub Actions buscará la versión estable de la rama 8.5 compatible con tu 8.5.6
        coverage: xdebug   # 🟢 Sincronizado con tu entorno local para evitar discrepancias de cobertura
        extensions: mbstring, xml, ctype, iconv, intl, pdo_sqlite, xdebug
        
    - name: Cache de dependencias de Composer
      id: composer-cache
      uses: actions/cache@v3
      with:
        path: vendor
        key: ${{ runner.os }}-php-${{ hashFiles('**/composer.lock') }}
        restore-keys: |
          ${{ runner.os }}-php-

    - name: Instalar dependencias
      run: composer install --prefer-dist --no-progress

    - name: 1. Lint (Sintaxis de todos los módulos)
      run: find . -type f -name '*.php' ! -path "./vendor/*" -exec php -l {} \; | grep -v "No syntax errors detected" || true

    - name: 2. Unit Tests (Filtrado)
      run: php vendor/bin/phpunit --testsuite "Domain Tests" --filter "${{ env.TEST_FILTER }}"

    #- name: 3. Integration Tests (Filtrado)
    #  run: php vendor/bin/phpunit --testsuite "Integration Tests" --filter "${{ env.TEST_FILTER }}"
      
    - name: 4. Generar Reporte de Cobertura XML con Xdebug
      # Usamos la directiva de entorno para activar el modo cobertura de Xdebug en la terminal de Linux
      env:
        XDEBUG_MODE: coverage
      run: |
        mkdir -p build
        php vendor/bin/phpunit --filter "${{ env.TEST_FILTER }}" --log-junit=build/phpunit.junit.xml --coverage-xml=build/coverage-xml

    - name: 5. Mutation Test & Quality Gate (Infection)
      if: success()
      env:
        XDEBUG_MODE: coverage
      run: php vendor/bin/infection --coverage=build --threads=max --min-msi=70 --min-covered-msi=90 --show-mutations --ansi --filter="${{ env.INFECTION_FILTER }}"
      
    - name: Subir Reporte de Mutación como Artefacto
      if: always() 
      uses: actions/upload-artifact@v4
      with:
        name: reporte-mutacion-global
        path: |
          build/
          infection-log.txt
        retention-days: 5