name: Hito 1 - Pipeline de Calidad CI/CD (Multi-Módulo)

on:
  push:
    branches: [ "main", "feature/*" ]
    paths:
      - 'src/**'
      - 'tests/**'
      - 'features/**' # 🎯 Detecta cambios también en tus archivos .feature de Behat
      - 'composer.json'
      - 'composer.lock'
      - '.github/workflows/**'
  pull_request:
    branches: [ "main" ]
    paths:
      - 'src/**'
      - 'tests/**'
      - 'features/**'

env:
  INFECTION_FILTER: "src/Cliente/Dominio" # 🎯 Módulo actual a mutar en Infection

jobs:
  quality-pipeline:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout del código
      uses: actions/checkout@v4

    - name: Configurar PHP 8.5 con Xdebug
      uses: shivammathur/setup-php@v2
      with:
        php-version: '8.5'
        coverage: xdebug
        extensions: mbstring, xml, ctype, iconv, intl, pdo_sqlite, xdebug
        
    - name: Cache de dependencias de Composer
      id: composer-cache
      uses: actions/cache@v3
      with:
        path: vendor
        key: ${{ runner.os }}-php-${{ hashFiles('**/composer.lock') }}
        restore-keys: |
          ${{ runner.os }}-php-

    - name: Instalar dependencias
      run: composer install --prefer-dist --no-progress

    - name: 1. Lint (Sintaxis de todos los módulos)
      run: find . -type f -name '*.php' ! -path "./vendor/*" -exec php -l {} \; | grep -v "No syntax errors detected" || true

    - name: 2. Ejecutar Unit Tests (Completo)
      run: php vendor/bin/phpunit --testsuite "Domain Tests"

    - name: 3. Ejecutar Integration Tests (Completo - Excluido de Mutation)
      run: php vendor/bin/phpunit --testsuite "Integration Tests"

    - name: 4. Ejecutar Pruebas de Comportamiento (Behat)
      run: |
        mkdir -p build
        # Usamos 'tee' para ver la salida en tiempo real en la consola y guardarla en un archivo para el reporte
        vendor/bin/behat --format=pretty | tee build/behat-output.txt
      
    - name: 5. Generar Reporte de Cobertura XML (Solo de Unit Tests para Infection)
      env:
        XDEBUG_MODE: coverage
      run: |
        mkdir -p build
        php vendor/bin/phpunit --testsuite "Domain Tests" --log-junit=build/phpunit.junit.xml --coverage-xml=build/coverage-xml

    - name: 6. Mutation Test & Quality Gate (Infection)
      if: success()
      env:
        XDEBUG_MODE: coverage 
      run: php vendor/bin/infection --coverage=build --threads=max --min-msi=70 --min-covered-msi=90 --show-mutations --ansi      
    - name: 7. Generar Resumen de Calidad en Fallos y Éxitos
      if: always()
      run: |
        echo "### 📊 Resumen de la Ejecución de Calidad" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        
        # 1. Analizar PHPUnit
        if [ -f "build/phpunit.junit.xml" ]; then
          TESTS_RUN=$(grep -oP 'tests="\K[^" ]+' build/phpunit.junit.xml | head -n 1 || echo "0")
          FAILURES=$(grep -oP 'failures="\K[^" ]+' build/phpunit.junit.xml | head -n 1 || echo "0")
          ERRORS=$(grep -oP 'errors="\K[^" ]+' build/phpunit.junit.xml | head -n 1 || echo "0")
          
          if [ "$FAILURES" -eq "0" ] && [ "$ERRORS" -eq "0" ]; then
            echo "✅ **PHPUnit:** ¡Todos los tests pasaron exitosamente! ($TESTS_RUN ejecutados)." >> $GITHUB_STEP_SUMMARY
          else
            echo "❌ **PHPUnit:** Se encontraron fallos en las pruebas. ($FAILURES fallos, $ERRORS errores de $TESTS_RUN ejecutados)." >> $GITHUB_STEP_SUMMARY
          fi
        else
          echo "⚠️ **PHPUnit:** No se pudo leer el reporte de pruebas JUnit." >> $GITHUB_STEP_SUMMARY
        fi

        echo "" >> $GITHUB_STEP_SUMMARY

        # 2. Analizar Behat (BDD)
        if [ -f "build/behat-output.txt" ]; then
          # Extraemos las líneas de resumen usando expresiones regulares sencillas
          BEHAT_SCENARIOS=$(grep -E '[0-9]+ scenario' build/behat-output.txt | tail -n 1 || echo "")
          BEHAT_STEPS=$(grep -E '[0-9]+ step' build/behat-output.txt | tail -n 1 || echo "")
          
          if echo "$BEHAT_SCENARIOS" | grep -q "failed"; then
            echo "❌ **Behat (BDD):** ¡Se encontraron escenarios fallidos!" >> $GITHUB_STEP_SUMMARY
          else
            echo "✅ **Behat (BDD):** ¡Todos los escenarios de comportamiento pasaron!" >> $GITHUB_STEP_SUMMARY
          fi
          
          [ ! -z "$BEHAT_SCENARIOS" ] && echo "- **Escenarios:** $BEHAT_SCENARIOS" >> $GITHUB_STEP_SUMMARY
          [ ! -z "$BEHAT_STEPS" ] && echo "- **Pasos:** $BEHAT_STEPS" >> $GITHUB_STEP_SUMMARY
        else
          echo "⚠️ **Behat:** No se generó el reporte de comportamiento de Behat." >> $GITHUB_STEP_SUMMARY
        fi

        echo "" >> $GITHUB_STEP_SUMMARY

        # 3. Analizar Log de Mutation Testing (Infection)
        if [ -f "infection-log.txt" ]; then
          MSI=$(grep -oP 'Mutation Score Indicator \(MSI\): \K[0-9]+' infection-log.txt | head -n 1 || echo "N/A")
          MUTANTS=$(grep -oP 'Total: \K[0-9]+' infection-log.txt | head -n 1 || echo "N/A")
          KILLED=$(grep -oP 'Killed: \K[0-9]+' infection-log.txt | head -n 1 || echo "N/A")
          
          echo "🧬 **Infection Mutation:** Score MSI obtenido: $MSI% (Mutantes totales: $MUTANTS, Eliminados: $KILLED)" >> $GITHUB_STEP_SUMMARY
        else
          echo "⚠️ **Infection:** No se ejecutó o no se generó el log de mutación." >> $GITHUB_STEP_SUMMARY
        fi

    - name: Subir Reporte de Mutación como Artefacto
      if: always() 
      uses: actions/upload-artifact@v4
      with:
        name: reporte-mutacion-global
        path: |
          build/
          infection-log.txt
        retention-days: 5