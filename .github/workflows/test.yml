name: Hito 1 - Pipeline de Calidad CI/CD (Multi-Módulo)

on:
  push:
    branches: [ "main", "feature/*" ]
    paths:
      - 'src/**'
      - 'tests/**'
      - 'composer.json'
      - 'composer.lock'
      - '.github/workflows/**'
  pull_request:
    branches: [ "main" ]
    paths:
      - 'src/**'
      - 'tests/**'

jobs:
  quality-pipeline:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout del código
      uses: actions/checkout@v4

    - name: Configurar PHP 8.5.6 con PCOV
      uses: shivammathur/setup-php@v2
      with:
        php-version: '8.5.6'
        coverage: pcov
        extensions: mbstring, xml, ctype, iconv, intl, pdo_sqlite, pcov
        
    - name: Cache de dependencias de Composer
      id: composer-cache
      uses: actions/cache@v3
      with:
        path: vendor
        key: ${{ runner.os }}-php-${{ hashFiles('**/composer.lock') }}
        restore-keys: |
          ${{ runner.os }}-php-

    - name: Instalar dependencias
      run: composer install --prefer-dist --no-progress

    - name: 1. Lint (Sintaxis de todos los módulos)
      run: find . -type f -name '*.php' ! -path "./vendor/*" -exec php -l {} \; | grep -v "No syntax errors detected" || true

    - name: 2. Unit Tests (Dominio Global)
      run: php vendor/bin/phpunit --testsuite "Domain Tests"

    - name: 3. Integration Tests (Infraestructura Global)
      run: php vendor/bin/phpunit --testsuite "Integration Tests"
      
    - name: 4. Generar Reporte de Cobertura XML para Infection
      # Creamos la carpeta build y generamos la cobertura limpia requerida por Infection
      run: |
        mkdir -p build
        php vendor/bin/phpunit --log-junit=build/phpunit.junit.xml --coverage-xml=build/coverage-xml

    - name: 5. Mutation Test & Quality Gate (Infection)
      if: success()
      # Le pasamos la ubicación exacta de la cobertura que acabamos de generar en el paso 4
      run: php vendor/bin/infection --coverage=build --threads=max --min-msi=70 --min-covered-msi=90 --show-mutations --ansi
      
    - name: Subir Reporte de Mutación como Artefacto
      if: always() 
      uses: actions/upload-artifact@v4
      with:
        name: reporte-mutacion-global
        path: |
          build/
          infection-log.txt
        retention-days: 5