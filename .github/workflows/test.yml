name: Hito 1 - Pipeline de Calidad CI/CD (Multi-Módulo)

on:
  push:
    branches: [ "main", "feature/*" ]
    # OPTIMIZACIÓN 1: Solo corre si cambias código en los módulos o configs
    paths:
      - 'src/**'
      - 'tests/**'
      - 'composer.json'
      - 'composer.lock'
      - '.github/workflows/**'
  pull_request:
    branches: [ "main" ]
    paths:
      - 'src/**'
      - 'tests/**'

jobs:
  quality-pipeline:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout del código
      uses: actions/checkout@v4

    - name: Configurar PHP 8.2
      uses: shivammathur/setup-php@v2
      with:
        php-version: '8.2'
        coverage: pcov # PCOV es obligatorio aquí; xdebug con muchos módulos sería lentísimo
        extensions: mbstring, xml, ctype, iconv, intl, pdo_sqlite, pcov
        
    - name: Cache de dependencias de Composer
      id: composer-cache
      uses: actions/cache@v3
      with:
        path: vendor
        key: ${{ runner.os }}-php-${{ hashFiles('**/composer.lock') }}
        restore-keys: |
          ${{ runner.os }}-php-

    - name: Instalar dependencias
      run: composer install --prefer-dist --no-progress --no-suggest

    # 1. Lint - Revisa la sintaxis de Citas, Users, Shared, etc.
    - name: 1. Lint (Sintaxis de todos los módulos)
      run: find . -type f -name '*.php' ! -path "./vendor/*" -exec php -l {} \; | grep -v "No syntax errors detected" || true

    # 2. Unit Tests - Ejecuta los tests de Dominio de TODOS los módulos a la vez
    - name: 2. Unit Tests (Dominio Global)
      run: php vendor/bin/phpunit --testsuite "Domain Tests"

    # 3. Integration Tests - Ejecuta la infraestructura de TODOS los módulos
    - name: 3. Integration Tests (Infraestructura Global)
      run: php vendor/bin/phpunit --testsuite "Integration Tests"
      
    # 4. Generar reporte Clover global para Infection
    - name: 4. Generar Reporte de Cobertura
      run: php vendor/bin/phpunit --coverage-clover build/clover.xml --coverage-text

    # 5. Pruebas de Mutación - Infection atacará a Citas, Users, etc., en paralelo
    - name: 5. Mutation Test & Quality Gate
      if: success()
      # Usamos --threads=max para procesar todas las carpetas rápido
      run: php vendor/bin/infection --threads=max --min-msi=70 --min-covered-msi=90 --show-mutations
      
    - name: Subir Reporte de Mutación como Artefacto
      if: always() 
      uses: actions/upload-artifact@v4
      with:
        name: reporte-mutacion-global
        path: |
          build/infection/
          infection-log.txt
        retention-days: 7