name: Hito 1 - Pipeline de Calidad CI/CD

on:
  push:
    branches: [ "main", "feature/*" ]
  pull_request:
    branches: [ "main" ]

jobs:
  quality-pipeline:
    runs-on: ubuntu-latest
    
    # ----------------------------------------------------
    # Preparación del entorno
    # ----------------------------------------------------
    steps:
    - name: Checkout del código
      uses: actions/checkout@v4

    - name: Configurar PHP 8.2
      uses: shivammathur/setup-php@v2
      with:
        php-version: '8.2'
        coverage: xdebug
        extensions: mbstring, xml, ctype, iconv, intl, pdo_sqlite
        
    - name: Cache de dependencias de Composer
      id: composer-cache
      uses: actions/cache@v3
      with:
        path: vendor
        key: ${{ runner.os }}-php-${{ hashFiles('**/composer.lock') }}
        restore-keys: |
          ${{ runner.os }}-php-

    - name: Instalar dependencias (Fase 2 - Build)
      run: composer install --prefer-dist --no-progress --no-suggest

    # ----------------------------------------------------
    # Ejecución Estricta (El orden importa según SWEBOK)
    # ----------------------------------------------------
    
    # 1. Lint (Evaluación de sintaxis estática)
    # Falla rápido y aborta si el código está mal escrito
    - name: 1. Lint (Sintaxis)
      run: find . -type f -name '*.php' ! -path "./vendor/*" -exec php -l {} \; | grep -v "No syntax errors detected" || true

    # 3. Unit Test (Pruebas unitarias aisladas)
    - name: 3. Unit Test (Dominio)
      run: php vendor/bin/phpunit --testsuite "Domain Tests"

    # 4. Integration Test (Flujos lógicos)
    - name: 4. Integration Test (Aplicación e Infraestructura)
      run: php vendor/bin/phpunit --testsuite "Application Tests"
      
    # 5. Coverage Report (Validar umbral > 80% en Dominio)
    - name: 5. Coverage Report (Quality Gate)
      run: |
        php vendor/bin/phpunit --coverage-text --coverage-clover coverage.xml
        # Aquí puedes usar un action de terceros para fallar si baja de 80, o un script
        # Por ahora, Infection también hace de Quality Gate en el siguiente paso

    # 6. Mutation Test (Infection PHP)
    - name: 6. Mutation Test & Quality Gate
      # Se ejecuta solo si unit test e integration test pasaron en verde
      if: success()
      run: php vendor/bin/infection --min-msi=70 --min-covered-msi=90 --show-mutations
      # -----------------------------------------------------------------------------------------
      # Umbral justificado en S07: El 70% de mutation score representa
      # el equilibrio óptimo entre el rigor analítico de los asserts y
      # el costo computacional en este runner de integración continua.
      # Por debajo, los asserts resultan demostrablemente débiles.
      # -----------------------------------------------------------------------------------------

    # ----------------------------------------------------
    # Desafío Técnico: Artefactos
    # ----------------------------------------------------
    - name: Subir Reporte de Mutación como Artefacto
      # Se ejecuta siempre (incluso si falló Infection por no alcanzar el MSI) para poder auditarlo
      if: always() 
      uses: actions/upload-artifact@v4
      with:
        name: reporte-mutacion-stryker
        path: |
          infection-report/
          infection-log.txt
          infection-summary.txt
        retention-days: 7