name: Pipeline de Calidad CI/CD (Multi-Módulo)

on:
  push:
    branches: [ "main", "feature/*" ]
    paths:
      - 'src/**'
      - 'tests/**'
      - 'features/**'
      - 'composer.json'
      - 'composer.lock'
      - '.github/workflows/**'
  pull_request:
    branches: [ "main" ]
    paths:
      - 'src/**'
      - 'tests/**'
      - 'features/**'

jobs:
  quality-pipeline:
    runs-on: ubuntu-latest
    
    # 🔐 REQUISITO SWEBOK: Permite al pipeline hacer commit y push del archivo JSON de auditoría
    permissions:
      contents: write
    
    steps:
    - name: Checkout del código
      uses: actions/checkout@v4
      with:
        # Trae todo el historial de commits necesario para el push de auditoría
        fetch-depth: 0

    - name: Configurar PHP 8.5 con Xdebug
      uses: shivammathur/setup-php@v2
      with:
        php-version: '8.5'
        coverage: xdebug
        extensions: mbstring, xml, ctype, iconv, intl, pdo_sqlite, xdebug
        
    - name: Cache de dependencias de Composer
      id: composer-cache
      uses: actions/cache@v3
      with:
        path: vendor
        key: ${{ runner.os }}-php-${{ hashFiles('**/composer.lock') }}
        restore-keys: |
          ${{ runner.os }}-php-

    - name: Instalar dependencias
      run: composer install --prefer-dist --no-progress

    - name: 1. Lint (Sintaxis de todos los módulos)
      run: find . -type f -name '*.php' ! -path "./vendor/*" -exec php -l {} \; | grep -v "No syntax errors detected" || true

    - name: 2. Ejecutar Unit Tests (Completo)
      run: php vendor/bin/phpunit --testsuite "Domain Tests"

    # - name: 3. Ejecutar Integration Tests (Opcional - Descomentar si usas BDD/Infraestructura)
    #   run: php vendor/bin/phpunit --testsuite "Integration Tests"

    - name: 4. Ejecutar Pruebas de Comportamiento (Behat)
      run: |
        mkdir -p build
        # 💡 Corregido con 'php' para evitar fallos de permisos locales en Linux
        php vendor/bin/behat --format=pretty | tee build/behat-output.txt
      
    - name: 5. Generar Reporte de Cobertura XML (De todos los Domain Tests para Infection)
      env:
        XDEBUG_MODE: coverage
      run: |
        mkdir -p build
        php vendor/bin/phpunit --testsuite "Domain Tests" --log-junit=build/phpunit.junit.xml --coverage-xml=build/coverage-xml

    - name: 6. Mutation Test & Quality Gate (Infection de Todo el Dominio)
      if: success()
      env:
        XDEBUG_MODE: coverage 
      # Configurado con un MSI mínimo riguroso del 80% acorde a la literatura de testing
      run: php vendor/bin/infection --coverage=build --threads=max --min-msi=80 --min-covered-msi=90 --show-mutations --ansi      

    # =========================================================================
    # SWEBOK v4.0a - CONFIGURATION STATUS ACCOUNTING (CONTABILIDAD DE ESTADO)
    # =========================================================================
# =========================================================================
    # SWEBOK v4.0a - CONFIGURATION STATUS ACCOUNTING (CONTABILIDAD DE ESTADO)
    # =========================================================================
    - name: 8. Registro de Contabilidad de Estado (Auditoría SCM)
      # 💡 CAMBIO: Ahora corre en cualquier rama secundaria (feature/*) si todo sale bien
      if: success() && github.ref != 'refs/heads/main'
      run: |
        echo "Generando registro de estado de configuración según SWEBOK v4.0a..."
        
        jq -n \
          --arg commit "${{ github.sha }}" \
          --arg autor "${{ github.actor }}" \
          --arg fecha "$(date -u +"%Y-%m-%dT%H:%M:%SZ")" \
          --arg ref "${{ github.ref }}" \
          --arg run_id "${{ github.run_id }}" \
          --arg run_num "${{ github.run_number }}" \
          '{
            "disciplina": "Configuration Status Accounting (SWEBOK v4.0a - Sec. 2.3)",
            "registro_auditoria": {
              "timestamp_utc": $fecha,
              "commit_sha": $commit,
              "autor": $autor,
              "origen_ref": $ref,
              "github_workflow": {
                "run_id": $run_id,
                "run_number": $run_num,
                "estado": "VERIFICADO_Y_EXITOSO"
              }
            }
          }' > scm-status-report.json

        git config --global user.name "github-actions[bot]"
        git config --global user.email "github-actions[bot]@users.noreply.github.com"

        git add scm-status-report.json
        
        if git diff --quiet && git diff --staged --quiet; then
          echo "La auditoría está al día. No se requieren cambios."
        else
          git commit -m "docs(scm): actualizar scm-status-report.json [SWEBOK Compliance] [skip ci]"
          # 💡 CAMBIO: Hace push a la rama actual (p. ej. feature/mi-rama) de forma segura
          git push origin HEAD:${{ github.ref }}
        fi